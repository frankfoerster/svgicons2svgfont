name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: 'Test'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version:
          - '22.x'
          - '24.x'
          - '25.x'

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6

      - name: 'Setup Node.js ${{ matrix.node-version }}'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: 'Install dependencies'
        run: npm install

      - name: 'Lint'
        run: npm run lint

      - name: 'Build'
        run: npm run build

      - name: 'Run tests'
        run: npm run test
